version: "3.9"

services:
  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000

  backend:
    build: ./backend
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/feedpulse
      JWT_SECRET: ${JWT_SECRET:-feedpulse-super-secret-jwt-key-2026}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your-gemini-api-key}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@feedpulse.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      CLIENT_ORIGIN: http://localhost:3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongo_data:
